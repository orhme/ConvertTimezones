<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldClock — Global Time & Weather</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-globe">🌍</span>
        <span class="logo-text">WorldClock</span>
      </div>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
        <span class="toggle-icon" id="toggleIcon">☽</span>
      </button>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="app-main">

    <!-- ── LOCAL TIME CARD ── -->
    <section class="card card-local" id="localCard">
      <div class="card-label">📍 My Location</div>
      <div class="local-location" id="localLocation">Detecting…</div>
      <div class="local-time" id="localTime">--:--:--</div>
      <div class="local-date" id="localDate">---</div>
      <div class="local-tz" id="localTz">---</div>
      <div class="local-weather" id="localWeather">
        <div class="weather-skeleton pulse"></div>
      </div>
    </section>

    <!-- ── SEARCH CARD ── -->
    <section class="card card-search">
      <div class="card-label">🔍 Compare with another location</div>
      <div class="search-wrapper">
        <input
          type="text"
          id="citySearch"
          class="search-input"
          placeholder="Search city or country…"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="search-icon">⌕</div>
        <ul class="suggestions-list" id="suggestionsList"></ul>
      </div>
      <p class="search-hint">Try "Tokyo", "New York", "Paris", "Dubai"…</p>
    </section>

    <!-- ── COMPARISON GRID ── -->
    <section class="comparison-grid" id="comparisonGrid">
      <!-- filled by JS -->
    </section>

  </main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <p>Powered by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> (weather) · <a href="https://worldtimeapi.org" target="_blank">WorldTimeAPI</a> · City data via public dataset · No API key required.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
